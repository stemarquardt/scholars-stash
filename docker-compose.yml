services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/homeschool_hub
      # Copy the rest from your .env file — do NOT hardcode secrets here
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      CORS_ORIGIN: "http://localhost:8080"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      GOOGLE_CALLBACK_URL: "http://localhost:8080/api/callback/google"
      # Optional — uncomment when you add these providers
      # FACEBOOK_APP_ID: "${FACEBOOK_APP_ID}"
      # FACEBOOK_APP_SECRET: "${FACEBOOK_APP_SECRET}"
      # FACEBOOK_CALLBACK_URL: "http://localhost:8080/api/callback/facebook"
      # DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID}"
      # DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET}"
      # DISCORD_CALLBACK_URL: "http://localhost:8080/api/callback/discord"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: homeschool_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d homeschool_hub"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
